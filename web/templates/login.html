<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sign In — Altria Ops</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #6366f1, #4338ca);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .card {
        background: white;
        border-radius: 16px;
        padding: 36px 32px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .logo {
        font-size: 22px;
        font-weight: 800;
        color: #6366f1;
        text-align: center;
        margin-bottom: 4px;
    }
    .sub {
        text-align: center;
        color: #94a3b8;
        font-size: 13px;
        margin-bottom: 28px;
    }
    label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #475569;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: .04em;
    }
    input {
        width: 100%;
        padding: 12px 14px;
        font-size: 15px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        margin-bottom: 18px;
        -webkit-appearance: none;
    }
    input:focus { outline: none; border-color: #6366f1; }
    button {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
    }
    button:active { transform: scale(.98); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 42px; }
    .pw-toggle {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        background: none; border: none; color: #94a3b8; cursor: pointer;
        font-size: 16px; width: auto; padding: 4px; margin: 0;
    }
    .pw-toggle:hover { color: #6366f1; }
    .error {
        background: #fef2f2;
        color: #ef4444;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        margin-bottom: 18px;
        font-weight: 600;
    }
    @media (max-width: 420px) {
        .card { padding: 28px 22px; border-radius: 12px; }
    }
</style>
</head>
<body>
    <div class="card">
        <div class="logo">🔐 Altria Ops</div>
        <div class="sub">Sign in to continue</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" autocomplete="username" autocapitalize="none" required autofocus>
            <label>Password</label>
            <div class="pw-wrap">
                <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
                <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)" aria-label="Show password"><i class="fas fa-eye"></i></button>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        function togglePw(inputId, btn) {
            const input = document.getElementById(inputId);
            const showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            btn.innerHTML = showing ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
